<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧠 AI Technical Tutor</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e8e8f0;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    .container { width: 100%; max-width: 760px; }

    h1 { font-size: 26px; font-weight: 600; margin-bottom: 24px; letter-spacing: -0.5px; color: #f8fafc; }

    .row { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
    .field { flex: 1; min-width: 140px; }

    label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }

    select, input[type="text"] {
      width: 100%; padding: 8px 12px;
      background: #1e2030; border: 1px solid #2d3148;
      border-radius: 6px; color: #e8e8f0; font-size: 14px; font-family: inherit;
      transition: border-color 0.15s;
    }
    select:focus, input[type="text"]:focus { outline: none; border-color: #f97316; }

    .voice-controls {
      display: flex; gap: 10px; align-items: center;
      background: #1e2030; border: 1px solid #2d3148;
      border-radius: 8px; padding: 10px 14px; margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .toggle-label { font-size: 12px; color: #94a3b8; margin-right: auto; }
    .toggle-btn {
      padding: 5px 14px; border-radius: 20px; border: 1px solid #2d3148;
      background: #141622; color: #888; font-family: inherit; font-size: 12px;
      cursor: pointer; transition: all 0.15s;
    }
    .toggle-btn.active { background: #f97316; border-color: #f97316; color: #fff; }

    #chatbox {
      height: 400px; background: #141622; border: 1px solid #2d3148;
      border-radius: 8px; overflow-y: auto; padding: 16px; margin-bottom: 12px;
    }

    .empty-msg { color: #4b5563; font-size: 13px; text-align: center; margin-top: 160px; }

    .turn { margin-bottom: 16px; }
    .bubble { padding: 10px 14px; border-radius: 6px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
    .bubble-user { background: #1e2030; border-left: 3px solid #f97316; margin-bottom: 8px; }
    .bubble-bot  { background: #141622; border-left: 3px solid #3b82f6; }

    .role-label { font-size: 11px; font-weight: 600; display: block; margin-bottom: 4px; }
    .role-user  { color: #f97316; }
    .role-bot   { color: #3b82f6; }

    .cursor { display: inline-block; width: 8px; height: 14px; background: #3b82f6; margin-left: 2px; vertical-align: middle; animation: blink 0.7s step-end infinite; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:0.8} 50%{transform:scale(1.15);opacity:1} }

    .input-row { display: flex; gap: 8px; }

    #msg-input {
      flex: 1; padding: 10px 14px;
      background: #1e2030; border: 1px solid #2d3148;
      border-radius: 6px; color: #e8e8f0; font-size: 14px; font-family: inherit;
    }
    #msg-input:focus { outline: none; border-color: #f97316; }
    #msg-input:disabled { opacity: 0.5; }

    #mic-btn {
      padding: 10px 14px; border-radius: 6px; border: 1px solid #2d3148;
      background: #1e2030; color: #888; font-size: 18px;
      cursor: pointer; transition: all 0.15s; line-height: 1;
    }
    #mic-btn.recording { background: rgba(239,68,68,0.15); border-color: #ef4444; color: #ef4444; animation: pulse 1s ease infinite; }
    #mic-btn.disabled-mic { opacity: 0.35; cursor: not-allowed; }

    #submit-btn {
      padding: 10px 20px; border-radius: 6px; border: none;
      background: #f97316; color: #fff; font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    #submit-btn:hover:not(:disabled) { background: #ea6a0a; }
    #submit-btn:disabled { background: #2d3148; color: #4b5563; cursor: not-allowed; }

    .status-bar { font-size: 11px; color: #4b5563; margin-top: 8px; min-height: 16px; }
    .status-bar.active { color: #f97316; }

    #tts-indicator {
      display: none; align-items: center; gap: 6px;
      font-size: 11px; color: #3b82f6; margin-top: 6px;
    }
    #tts-indicator.visible { display: flex; }
    .tts-dot { width: 6px; height: 6px; border-radius: 50%; background: #3b82f6; animation: pulse 0.8s ease infinite; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>
<div class="container">
  <h1>🧠 AI Technical Tutor</h1>

  <div class="row">
    <div class="field">
      <label for="provider">Provider</label>
      <select id="provider">
        <option value="openai">openai</option>
        <option value="ollama">ollama</option>
      </select>
    </div>
    <div class="field">
      <label for="model">Model</label>
      <input type="text" id="model" value="gpt-4o-mini" />
    </div>
  </div>

  <div class="voice-controls">
    <span class="toggle-label">🎙 Voice I/O</span>
    <button class="toggle-btn" id="voice-input-btn">Voice Input: OFF</button>
    <button class="toggle-btn active" id="tts-btn">TTS: ON</button>
    <button class="toggle-btn" id="stop-tts-btn">⏹ Stop</button>
  </div>

  <div id="chatbox">
    <p class="empty-msg" id="empty-msg">Ask a programming question to get started...</p>
  </div>

  <div class="input-row">
    <button id="mic-btn" class="disabled-mic" title="Enable Voice Input first">🎤</button>
    <input type="text" id="msg-input" placeholder="Ask a programming question..." />
    <button id="submit-btn">Submit</button>
  </div>

  <div class="status-bar" id="status-bar"></div>
  <div id="tts-indicator"><div class="tts-dot"></div> Speaking...</div>
</div>

<script>
  let history = [];
  let streaming = false;
  let voiceInputEnabled = false;
  let ttsEnabled = true;
  let recognition = null;
  let isRecording = false;

  const chatbox       = document.getElementById("chatbox");
  const msgInput      = document.getElementById("msg-input");
  const submitBtn     = document.getElementById("submit-btn");
  const micBtn        = document.getElementById("mic-btn");
  const statusBar     = document.getElementById("status-bar");
  const ttsIndicator  = document.getElementById("tts-indicator");
  const voiceInputBtn = document.getElementById("voice-input-btn");
  const ttsToggleBtn  = document.getElementById("tts-btn");
  const stopTtsBtn    = document.getElementById("stop-tts-btn");

  // ── TTS ──
  function speak(text) {
    if (!ttsEnabled || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const clean = text
      .replace(/```[\s\S]*?```/g, ". Here is a code example.")
      .replace(/`([^`]+)`/g, "$1")
      .replace(/[*#_]/g, "")
      .replace(/\n+/g, " ");
    const utt = new SpeechSynthesisUtterance(clean);
    utt.rate = 1.05;
    utt.onstart = () => ttsIndicator.classList.add("visible");
    utt.onend = utt.onerror = () => ttsIndicator.classList.remove("visible");
    window.speechSynthesis.speak(utt);
  }

  function stopSpeaking() {
    window.speechSynthesis?.cancel();
    ttsIndicator.classList.remove("visible");
  }

  ttsToggleBtn.addEventListener("click", () => {
    ttsEnabled = !ttsEnabled;
    ttsToggleBtn.textContent = `TTS: ${ttsEnabled ? "ON" : "OFF"}`;
    ttsToggleBtn.classList.toggle("active", ttsEnabled);
    if (!ttsEnabled) stopSpeaking();
  });

  stopTtsBtn.addEventListener("click", stopSpeaking);

  // ── Voice Input ──
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  voiceInputBtn.addEventListener("click", () => {
    if (!SpeechRecognition) {
      setStatus("⚠ Speech recognition not supported in this browser.", false); return;
    }
    voiceInputEnabled = !voiceInputEnabled;
    voiceInputBtn.textContent = `Voice Input: ${voiceInputEnabled ? "ON" : "OFF"}`;
    voiceInputBtn.classList.toggle("active", voiceInputEnabled);
    micBtn.classList.toggle("disabled-mic", !voiceInputEnabled);
  });

  micBtn.addEventListener("click", () => {
    if (!voiceInputEnabled) { setStatus("Enable Voice Input first.", false); return; }
    isRecording ? stopRecording() : startRecording();
  });

  function startRecording() {
    if (!SpeechRecognition) return;
    stopSpeaking();
    recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.interimResults = true;
    recognition.continuous = false;

    recognition.onstart = () => {
      isRecording = true;
      micBtn.classList.add("recording");
      setStatus("🔴 Listening...", true);
    };
    recognition.onresult = (e) => {
      msgInput.value = Array.from(e.results).map(r => r[0].transcript).join("");
    };
    recognition.onend = () => {
      isRecording = false;
      micBtn.classList.remove("recording");
      setStatus("", false);
      if (msgInput.value.trim()) respond();
    };
    recognition.onerror = (e) => {
      isRecording = false;
      micBtn.classList.remove("recording");
      setStatus(`Recognition error: ${e.error}`, false);
    };
    recognition.start();
  }

  function stopRecording() { recognition?.stop(); }

  // ── Helpers ──
  function setStatus(msg, active) {
    statusBar.textContent = msg;
    statusBar.className = "status-bar" + (active ? " active" : "");
  }

  function setStreaming(val) {
    streaming = val;
    msgInput.disabled = val;
    submitBtn.disabled = val;
    submitBtn.textContent = val ? "..." : "Submit";
  }

  function escapeHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function appendTurn(userText) {
    document.getElementById("empty-msg")?.remove();
    const turn = document.createElement("div");
    turn.className = "turn";
    turn.innerHTML = `
      <div class="bubble bubble-user"><span class="role-label role-user">YOU</span>${escapeHtml(userText)}</div>
      <div class="bubble bubble-bot"><span class="role-label role-bot">TUTOR</span><span class="bot-text"></span><span class="cursor"></span></div>`;
    chatbox.appendChild(turn);
    chatbox.scrollTop = chatbox.scrollHeight;
    return turn.querySelector(".bot-text");
  }

  // ── Core ──
  async function respond() {
    const message = msgInput.value.trim();
    if (!message || streaming) return;
    msgInput.value = "";
    setStreaming(true);
    stopSpeaking();

    history.push({ role: "user", content: message });
    const botTextEl = appendTurn(message);
    const cursorEl  = botTextEl.nextElementSibling;
    let fullText = "";

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        for (const line of decoder.decode(value).split("\n")) {
          if (!line.startsWith("data: ")) continue;
          try {
            const p = JSON.parse(line.slice(6));
            if (p.type === "content_block_delta" && p.delta?.text) {
              fullText += p.delta.text;
              botTextEl.textContent = fullText;
              chatbox.scrollTop = chatbox.scrollHeight;
            }
          } catch {}
        }
      }

      history.push({ role: "assistant", content: fullText });
      speak(fullText);

    } catch (err) {
      botTextEl.textContent = "Error: " + err.message;
    } finally {
      cursorEl?.remove();
      setStreaming(false);
      msgInput.focus();
    }
  }

  submitBtn.addEventListener("click", respond);
  msgInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); respond(); }
  });
</script>
</body>
</html>
